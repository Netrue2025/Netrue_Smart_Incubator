[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
  adafruit/DHT sensor library@^1.4.6
  adafruit/Adafruit Unified Sensor@^1.1.15
  olikraus/U8g2@^2.36.5
  bblanchon/ArduinoJson@^7.2.1
build_flags =
  -D CORE_DEBUG_LEVEL=3
